import = ["/home/bruno.parolini@olxbr.net/.config/alacritty/catppuccin/catppuccin-mocha.toml"]

live_config_reload = true
working_directory = "None"

[font]
size = 11.0

[font.bold]
family = "JetBrainsMono NF"
style = "Bold"

[font.bold_italic]
family = "JetBrainsMono NF"
style = "Bold Italic"

[font.italic]
family = "JetBrainsMono NF"
style = "Italic"

[font.normal]
family = "JetBrainsMono NF"
style = "Regular"

[mouse]
hide_when_typing = true

[scrolling]
history = 10000
multiplier = 3

[shell]
program = "/usr/bin/tmux"

[window]
opacity = 0.95
startup_mode = "Maximized"
