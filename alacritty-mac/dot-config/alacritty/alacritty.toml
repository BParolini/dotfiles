live_config_reload = true

working_directory = "None"

import = [
    # "~/.config/alacritty/themes/themes/{theme}.toml"
    "~/.config/alacritty/themes/themes/catppuccin_mocha.toml"
    # "~/.config/alacritty/themes/themes/solarized_dark.toml"
    # "~/.config/alacritty/themes/themes/nord.toml"
    # "~/.config/alacritty/themes/themes/rose-pine.toml"
]

[env]
TERM = "xterm-256color"

[window]
padding.x = 5
padding.y = 5

decorations = "Buttonless"

option_as_alt = "Both"

startup_mode = "Maximized"

[font]
size = 13.0

[font.normal]
family = "JetBrainsMono NF Light"
style = "Light"

[font.bold]
family = "JetBrainsMono NF SemiBold"
style = "SemiBold"

[font.italic]
family = "JetBrainsMono NF Light"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono NF SemiBold"
style = "SemiBold Italic"

[mouse]
hide_when_typing = true

[scrolling]
history = 10000
multiplier = 3

[selection]
save_to_clipboard = true

[shell]
program = "/opt/homebrew/bin/tmux"
