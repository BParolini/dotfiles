# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME

vim:fileencoding=utf-8:foldmethod=marker

# Check all config options in https://sw.kovidgoyal.net/kitty/conf/

font_size 13.0
font_family JetBrainsMono Nerd Font Light
bold_font JetBrainsMono Nerd Font SemiBold
italic_font JetBrainsMono Nerd Font Light Italic
bold_italic_font JetBrainsMono Nerd Font SemiBold Italic
disable_ligatures never

remember_window_size  yes
draw_minimal_borders yes
window_padding_width 5
hide_window_decorations yes
confirm_os_window_close 0

shell /opt/homebrew/bin/tmux
editor /opt/homebrew/bin/nvim

macos_option_as_alt yes
macos_quit_when_last_window_closed yes
macos_colorspace default

sync_to_monitor yes
allow_hyperlinks yes
shell_integration enabled
enable_audio_bell no

update_check_interval 0
